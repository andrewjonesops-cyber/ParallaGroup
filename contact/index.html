<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contact Paralla Group — Find the right team for your inquiry.">
<title>Contact Us — Paralla Group</title>

<style>
:root{
--cobalt:#0B4DFF;
--ink:#101828;
--muted:#667085;
--line:#E6EAF2;
--panel:#F7F9FC;
--radius:16px;
--max:1100px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
color:var(--ink);
background:#fff;
line-height:1.5;
}

.page-hero{
display:grid;
grid-template-columns:minmax(0,1.05fr) minmax(240px,340px);
gap:32px;
align-items:center;
margin-bottom:56px;
}

.page-hero h1{
font-size:clamp(32px,3.2vw,46px);
margin-bottom:16px;
}

.page-hero .lead{
font-size:18px;
color:var(--muted);
max-width:60ch;
}

.hero-image{
width:100%;
max-width:320px;
aspect-ratio:4/5;
object-fit:cover;

-webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 72%, rgba(0,0,0,.6) 88%, rgba(0,0,0,0) 100%);
mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 72%, rgba(0,0,0,.6) 88%, rgba(0,0,0,0) 100%);
}

.rule{
height:1px;
background:linear-gradient(90deg,rgba(11,77,255,.5),transparent);
margin:48px 0;
}
</style>
</head>

<body>

<div class="page-hero">

<div>
<h1>Contact Paralla Group</h1>
<p class="lead">
Connect with the right team at Paralla Group.
<br><br>
We route inquiries with intent—so you reach the people best positioned to respond, whether you're exploring our work, discussing a partnership, or looking for support.
</p>
</div>

<div>
<img src="/images/Modern_Office_Collaboration.png"
alt="Business professionals collaborating and reviewing data on screens"
class="hero-image">
</div>

</div>

<div class="rule"></div>

</body>
</html>
