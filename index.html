<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Paralla Group — Designing systems that help people and hold up under scrutiny.">
<title>Paralla Group — Launching Soon</title>

<style>
:root{
  --cobalt:#0B4DFF;
  --ink:#101828;
  --muted:#667085;
  --line:#E6EAF2;
  --panel:#F7F9FC;
  --radius:16px;
  --max:1100px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);
  background:#ffffff;
  line-height:1.5;
}

/* ================= HEADER ================= */

header{
  border-bottom:1px solid var(--line);
  padding:18px 24px;
  background:#ffffff;
}

.topbar{
  max-width:var(--max);
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:inherit;
}

.brand img{
  height:42px;
  width:auto;
  display:block;
}

.brand-name{
  font-weight:600;
  font-size:18px;
  letter-spacing:.2px;
}

.badge{
  font-size:13px;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid rgba(11,77,255,.25);
  background:rgba(11,77,255,.06);
  color:var(--cobalt);
  font-weight:500;
}

.accent{
  height:3px;
  background:linear-gradient(90deg,var(--cobalt),rgba(11,77,255,.2),transparent);
}

/* ================= NAV ================= */

nav{
  background:#ffffff;
  border-bottom:1px solid var(--line);
  padding:0 24px;
  position:relative;
  z-index:100;
}

.nav-inner{
  max-width:var(--max);
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:4px;
  overflow-x:auto;
  scrollbar-width:none;
}

.nav-inner::-webkit-scrollbar{
  display:none;
}

/* Plain nav links */
.nav-inner > a{
  display:inline-block;
  padding:12px 16px;
  font-size:14px;
  font-weight:500;
  color:var(--muted);
  text-decoration:none;
